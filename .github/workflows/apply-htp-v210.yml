name: Apply HTP Colony Supply v2.1.0

on:
  push:
    paths:
      - '.github/workflows/apply-htp-v210.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Assemble and verify program
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          import hashlib

          root = Path('.htp_patch_v210')
          parts = [root / f'part{i:02d}.txt' for i in range(10)]
          missing = [str(path) for path in parts if not path.exists()]
          if missing:
              raise SystemExit('Missing patch parts: ' + ', '.join(missing))

          encoded = ''.join(path.read_text(encoding='utf-8').strip() for path in parts)
          data = base64.b64decode(encoded, validate=True)
          expected = 'dae450f6201e5d0cb800b9d5e5fbf1a21d6c74928345cb43bda2c13af8b3ef3d'
          actual = hashlib.sha256(data).hexdigest()
          if actual != expected:
              raise SystemExit(f'SHA mismatch: expected {expected}, got {actual}')

          target = Path('programs/CCxMCxHTP.lua')
          target.write_bytes(data)
          print(f'Wrote {len(data)} bytes to {target} with SHA-256 {actual}')
          PY

      - name: Commit verified update
        shell: bash
        run: |
          rm -rf .htp_patch_v210
          rm -f .github/workflows/apply-htp-v210.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No changes to commit.'
            exit 0
          fi
          git commit -m 'Add exact framed variants and multi-rack warehouse output'
          git push
